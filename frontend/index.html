<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpotCheck AI — 设备屏显智能点检</title>
    <meta name="description" content="制造业设备屏显AI智能点检系统，自动识别设备参数">
    <link rel="stylesheet" href="/static/index.css">
</head>
<body>
    <!-- ====== 顶部导航 ====== -->
    <header class="app-header">
        <div class="header-inner">
            <div class="logo-group">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18"/>
                        <circle cx="12" cy="12" r="2"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>SpotCheck AI</h1>
                    <p>设备屏显智能点检</p>
                </div>
            </div>
            <div class="header-badge">
                <span class="badge-dot"></span>
                <span>AI 就绪</span>
            </div>
        </div>
    </header>

    <!-- ====== 主内容 ====== -->
    <main class="main-content">
        <!-- 上传区域 -->
        <section id="upload-section" class="upload-section">
            <div id="drop-zone" class="drop-zone">
                <div class="drop-zone-inner">
                    <div class="upload-icon">
                        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="6" y="10" width="36" height="28" rx="3" stroke-dasharray="4 2"/>
                            <circle cx="24" cy="24" r="6"/>
                            <circle cx="24" cy="24" r="2"/>
                            <path d="M14 14h4" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h2 class="upload-title">上传设备屏幕图片</h2>
                    <p class="upload-desc">支持 JPG、PNG 格式，点击或拖拽上传</p>
                    <div class="upload-buttons">
                        <label class="btn btn-primary" id="file-btn">
                            <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
                                <path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z"/>
                            </svg>
                            选择图片
                            <input type="file" accept="image/*" id="file-input" hidden>
                        </label>
                    </div>
                </div>
            </div>
        </section>

        <!-- 加载状态 -->
        <section id="loading-section" class="loading-section hidden">
            <div class="loading-card">
                <div class="loading-spinner">
                    <div class="spinner-ring"></div>
                    <div class="spinner-ring"></div>
                    <div class="spinner-ring"></div>
                </div>
                <h3 class="loading-title">AI 正在识别...</h3>
                <p class="loading-desc" id="loading-step">正在预处理图片</p>
                <div class="loading-bar">
                    <div class="loading-bar-fill" id="loading-progress"></div>
                </div>
            </div>
        </section>

        <!-- 识别结果 -->
        <section id="result-section" class="result-section hidden">
            <!-- 统计栏 -->
            <div class="stats-bar" id="stats-bar">
                <div class="stat-item">
                    <span class="stat-value" id="stat-total-time">-</span>
                    <span class="stat-label">总耗时</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-param-count">-</span>
                    <span class="stat-label">参数识别</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-text-count">-</span>
                    <span class="stat-label">文字检测</span>
                </div>
                <div class="stat-divider"></div>
                <div class="stat-item">
                    <span class="stat-value" id="stat-ocr-time">-</span>
                    <span class="stat-label">OCR 耗时</span>
                </div>
            </div>

            <!-- 图片对比区 -->
            <div class="image-compare">
                <div class="image-card">
                    <div class="image-card-header">
                        <span class="image-tag tag-original">原图</span>
                    </div>
                    <div class="image-wrapper">
                        <img id="original-image" alt="原始图片">
                    </div>
                </div>
                <div class="image-card">
                    <div class="image-card-header">
                        <span class="image-tag tag-annotated">AI 标注</span>
                    </div>
                    <div class="image-wrapper">
                        <img id="annotated-image" alt="标注图片">
                    </div>
                </div>
            </div>

            <!-- 参数结果 -->
            <div class="params-section">
                <div class="params-header">
                    <h2>
                        <svg viewBox="0 0 20 20" fill="currentColor" width="22" height="22">
                            <path fill-rule="evenodd" d="M6 2a2 2 0 00-2 2v12a2 2 0 002 2h8a2 2 0 002-2V7.414A2 2 0 0015.414 6L12 2.586A2 2 0 0010.586 2H6zm5 6a1 1 0 10-2 0v2H7a1 1 0 100 2h2v2a1 1 0 102 0v-2h2a1 1 0 100-2h-2V8z"/>
                        </svg>
                        识别参数
                    </h2>
                    <div class="params-header-actions">
                        <button class="btn btn-sm btn-ghost" id="toggle-raw-btn" onclick="toggleRawTexts()">
                            <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
                                <path d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z"/>
                            </svg>
                            原始文本
                        </button>
                    </div>
                </div>

                <!-- 参数卡片网格 -->
                <div class="params-grid" id="params-grid">
                    <!-- 动态生成 -->
                </div>

                <!-- 无参数提示 -->
                <div class="empty-params hidden" id="empty-params">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
                        <path d="M9.75 9.75l4.5 4.5m0-4.5l-4.5 4.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <p>未能识别出参数键值对</p>
                    <span>请确保图片清晰，屏幕内容完整可见</span>
                </div>
            </div>

            <!-- 原始 OCR 文本（默认隐藏） -->
            <div class="raw-texts-section hidden" id="raw-texts-section">
                <div class="raw-texts-header">
                    <h3>OCR 原始识别文本</h3>
                </div>
                <div class="raw-texts-list" id="raw-texts-list">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 操作栏 -->
            <div class="action-bar">
                <button class="btn btn-primary btn-lg" onclick="resetUpload()">
                    <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
                        <path fill-rule="evenodd" d="M4 3a2 2 0 00-2 2v10a2 2 0 002 2h12a2 2 0 002-2V5a2 2 0 00-2-2H4zm12 12H4l4-8 3 6 2-4 3 6z"/>
                    </svg>
                    继续识别下一张
                </button>
            </div>
        </section>

        <!-- 错误提示 -->
        <section id="error-section" class="error-section hidden">
            <div class="error-card">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
                    <path d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"/>
                </svg>
                <h3>识别失败</h3>
                <p id="error-message">未知错误</p>
                <button class="btn btn-primary" onclick="resetUpload()">重新上传</button>
            </div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
